<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Race · Live</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23FFD700'%3E%3Cpath d='M12 2L15 9H22L16 14L19 21L12 16.5L5 21L8 14L2 9H9L12 2Z'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    :root {
      --bg:        #06080d;
      --surface:   #0c1017;
      --border:    rgba(255,255,255,0.07);
      --accent:    #3d8bff;
      --accent2:   #00e5c0;
      --gold:      #f5c842;
      --text:      #e8efff;
      --muted:     #6b7a96;
      --glow:      rgba(61,139,255,0.18);
      --glow2:     rgba(0,229,192,0.12);
      --card-bg:   rgba(255,255,255,0.03);
      --red:       #ff4d6d;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
      position: relative;
    }

    /* ── GRID BACKGROUND ── */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image:
        linear-gradient(rgba(61,139,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(61,139,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── AMBIENT GLOW BLOBS ── */
    .blob {
      position: fixed; border-radius: 50%;
      filter: blur(90px); z-index: 0; pointer-events: none;
      animation: drift 28s infinite alternate ease-in-out;
    }
    .blob1 {
      width: 600px; height: 600px;
      top: -200px; left: -150px;
      background: radial-gradient(circle, rgba(61,139,255,0.12), transparent 70%);
    }
    .blob2 {
      width: 500px; height: 500px;
      bottom: -150px; right: -100px;
      background: radial-gradient(circle, rgba(0,229,192,0.1), transparent 70%);
      animation-duration: 22s; animation-direction: alternate-reverse;
    }
    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.15); }
    }

    /* ── LAYOUT ── */
    .shell {
      position: relative; z-index: 5;
      max-width: 1100px;
      margin: 0 auto;
      padding: 28px 24px 40px;
    }

    /* ── TOP BAR ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
    }

    .brand {
      display: flex; align-items: center; gap: 10px;
    }
    .brand-dot {
      width: 9px; height: 9px; border-radius: 50%;
      background: var(--accent2);
      box-shadow: 0 0 12px var(--accent2);
      animation: blink 1.6s infinite;
    }
    @keyframes blink {
      0%,100% { opacity: 1; } 50% { opacity: 0.3; }
    }
    .brand-label {
      font-size: 0.78rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--accent2);
    }
    #syncLabel { color: var(--muted); font-size: 0.78rem; letter-spacing: 0.1em; }

    .topbar-right { display: flex; align-items: center; gap: 10px; }

    .pill-btn {
      display: flex; align-items: center; gap: 6px;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 8px 16px;
      cursor: pointer;
      font-family: 'Syne', sans-serif;
      font-size: 0.8rem;
      color: var(--muted);
      transition: all 0.2s;
    }
    .pill-btn:hover { border-color: var(--accent); color: var(--accent); }
    .pill-btn svg {
      width: 16px; height: 16px;
      stroke: currentColor; stroke-width: 2; fill: none; flex-shrink: 0;
    }
    .pill-btn.active { color: var(--accent2); border-color: var(--accent2); }

    /* ── STATS BOX (G1 / G2) ── */
    .stats-bar {
      display: flex;
      gap: 16px;
      margin-bottom: 24px;
    }
    .stat-card {
      flex: 1;
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 20px 26px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      opacity: 0;
      transition: opacity 0.3s;
    }
    .stat-card:hover::before { opacity: 1; }
    .stat-card:hover { border-color: rgba(61,139,255,0.25); }

    .stat-label {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .stat-value {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1;
    }
    .stat-value.is-number {
      font-family: 'DM Mono', monospace;
      font-size: 2.4rem;
      color: var(--gold);
      text-shadow: 0 0 20px rgba(245,200,66,0.3);
    }
    .stat-value.pop {
      animation: statPop 0.5s cubic-bezier(0.2,0.9,0.4,1.2);
    }
    @keyframes statPop {
      50% { transform: scale(1.06); color: var(--gold); }
    }

    /* ── MAIN COUNTER CARD ── */
    .main-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 40px 44px;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .main-card::after {
      content: '';
      position: absolute;
      inset: 0; border-radius: 28px;
      background: radial-gradient(ellipse 80% 60% at 50% 0%, var(--glow), transparent);
      pointer-events: none;
    }
    .main-card.celebrate {
      border-color: var(--gold);
      box-shadow: 0 0 60px rgba(245,200,66,0.1), inset 0 0 40px rgba(245,200,66,0.04);
    }

    .card-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 8px;
    }
    .team-eyebrow {
      font-size: 0.7rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .team-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
    }
    .total-badge {
      background: rgba(61,139,255,0.12);
      border: 1px solid rgba(61,139,255,0.2);
      border-radius: 12px;
      padding: 8px 18px;
      font-family: 'DM Mono', monospace;
      font-size: 0.85rem;
      color: var(--accent);
      letter-spacing: 0.05em;
    }

    .counter-hero {
      font-family: 'DM Mono', monospace;
      font-size: clamp(6rem, 14vw, 10rem);
      font-weight: 500;
      line-height: 1;
      letter-spacing: -0.04em;
      color: var(--text);
      text-shadow: 0 0 60px var(--glow), 0 0 100px var(--glow);
      margin: 16px 0 32px;
      font-feature-settings: "tnum";
      transition: all 0.2s;
    }
    .counter-hero.pop {
      animation: heroPop 0.5s cubic-bezier(0.2,0.9,0.4,1.2);
    }
    @keyframes heroPop {
      50% {
        text-shadow: 0 0 80px rgba(245,200,66,0.5), 0 0 140px rgba(245,200,66,0.3);
        transform: scale(1.015);
      }
    }

    /* ── MEMBER TAGS ── */
    .member-grid {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      border-top: 1px solid var(--border);
      padding-top: 26px;
    }
    .member-tag {
      display: flex; align-items: center; gap: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid var(--border);
      border-radius: 100px;
      padding: 9px 20px;
      font-size: 0.92rem;
      font-weight: 600;
      color: var(--text);
      transition: all 0.2s;
    }
    .member-tag:hover {
      background: rgba(61,139,255,0.08);
      border-color: rgba(61,139,255,0.25);
    }
    .member-tag .val {
      font-family: 'DM Mono', monospace;
      font-size: 0.95rem;
      font-weight: 500;
      color: var(--gold);
      min-width: 1.5ch;
      text-align: right;
    }
    .member-tag.flash {
      animation: tagFlash 0.6s ease;
    }
    @keyframes tagFlash {
      30% {
        background: rgba(245,200,66,0.15);
        border-color: var(--gold);
        transform: scale(1.04);
      }
    }

    /* ── TICKER ── */
    .ticker-bar {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 14px 22px;
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 0;
    }
    .ticker-icon { color: var(--accent); display: flex; }
    .ticker-icon svg { width: 18px; height: 18px; stroke: currentColor; stroke-width: 2; fill: none; }
    .ticker-content {
      flex: 1; overflow: hidden; height: 26px; position: relative;
    }
    .ticker-item {
      position: absolute; width: 100%;
      font-family: 'DM Mono', monospace;
      font-size: 0.88rem; font-weight: 400;
      color: var(--muted);
      white-space: nowrap;
      animation: tickIn 0.35s ease;
    }
    @keyframes tickIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .audio-hint {
      font-size: 0.75rem;
      color: var(--muted);
      white-space: nowrap;
    }

    /* ── TOASTS ── */
    .toast {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -60%) scale(0.96);
      z-index: 999;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.3s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
    }
    .toast.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .toast-inner {
      background: rgba(10,14,22,0.92);
      backdrop-filter: blur(30px);
      -webkit-backdrop-filter: blur(30px);
      border: 1px solid rgba(61,139,255,0.4);
      border-radius: 24px;
      padding: 26px 52px;
      text-align: center;
      box-shadow: 0 30px 60px rgba(0,0,0,0.5), 0 0 80px rgba(61,139,255,0.15);
      min-width: 340px;
    }
    .toast-name {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      color: var(--text);
      line-height: 1.2;
    }
    .toast-sub {
      font-family: 'DM Mono', monospace;
      font-size: 0.9rem;
      color: var(--accent2);
      margin-top: 6px;
      letter-spacing: 0.08em;
    }
    .toast-diff {
      display: inline-block;
      margin-top: 10px;
      background: rgba(245,200,66,0.12);
      border: 1px solid rgba(245,200,66,0.3);
      border-radius: 100px;
      padding: 4px 18px;
      font-family: 'DM Mono', monospace;
      font-size: 1.1rem;
      font-weight: 500;
      color: var(--gold);
    }

    .r2-toast-inner {
      background: rgba(10,14,22,0.92);
      backdrop-filter: blur(30px);
      border: 1px solid rgba(0,229,192,0.35);
      border-radius: 20px;
      padding: 22px 44px;
      text-align: center;
      box-shadow: 0 20px 50px rgba(0,0,0,0.4), 0 0 60px rgba(0,229,192,0.1);
      max-width: 480px;
    }
    .r2-message {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1.4;
    }
    .r2-badge {
      display: inline-block;
      margin-bottom: 8px;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--accent2);
    }

    /* ── RESPONSIVE ── */
    @media (max-width: 640px) {
      .stats-bar { flex-direction: column; }
      .main-card { padding: 28px 24px; }
      .counter-hero { font-size: 5.5rem; }
      .team-name { font-size: 1.5rem; }
      .toast-inner { min-width: 280px; padding: 22px 32px; }
    }
  </style>
</head>
<body>
<div class="blob blob1"></div>
<div class="blob blob2"></div>

<div class="shell">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="brand">
      <div class="brand-dot"></div>
      <span class="brand-label">Sales Race</span>
      <span id="syncLabel">· connecting</span>
    </div>
    <div class="topbar-right">
      <button class="pill-btn" id="audioBtn">
        <svg viewBox="0 0 24 24">
          <path d="M3 10V14H7L12 19V5L7 10H3Z"/>
          <path d="M16 8.5C17.3333 10 17.3333 14 16 15.5"/>
          <path d="M19 5C22 9 22 15 19 19"/>
        </svg>
        <span id="audioStateHint">Sound off</span>
      </button>
    </div>
  </div>

  <!-- STATS BAR (G1 / G2) -->
  <div class="stats-bar" id="statsBar">
    <div class="stat-card" id="statCard1">
      <div class="stat-label" id="statLabel1">Stat</div>
      <div class="stat-value" id="statValue1">—</div>
    </div>
    <div class="stat-card" id="statCard2">
      <div class="stat-label">Target</div>
      <div class="stat-value is-number" id="statValue2">—</div>
    </div>
  </div>

  <!-- MAIN COUNTER CARD -->
  <div class="main-card" id="mainCard">
    <div class="card-header">
      <div>
        <div class="team-eyebrow">Team Performance</div>
        <div class="team-name" id="teamName">Loading…</div>
      </div>
      <div class="total-badge">
        TOTAL &nbsp;<span id="totalBadge">0</span>
      </div>
    </div>

    <div class="counter-hero" id="heroCounter">0</div>

    <div class="member-grid" id="memberGrid"></div>
  </div>

  <!-- TICKER -->
  <div class="ticker-bar">
    <div class="ticker-icon">
      <svg viewBox="0 0 24 24"><path d="M22 12H18L15 21L9 3L6 12H2" stroke-linecap="round" stroke-linejoin="round"/></svg>
    </div>
    <div class="ticker-content" id="tickerContent">
      <div class="ticker-item">Connecting to live feed…</div>
    </div>
    <span class="audio-hint" id="audioHint"></span>
  </div>

</div>

<!-- SALE TOAST -->
<div class="toast" id="saleToast">
  <div class="toast-inner">
    <div class="toast-name" id="toastName">—</div>
    <div class="toast-sub" id="toastSub">GOT A DO</div>
    <div class="toast-diff" id="toastDiff">+1</div>
  </div>
</div>

<!-- R2 MESSAGE TOAST -->
<div class="toast" id="r2Toast">
  <div class="r2-toast-inner">
    <div class="r2-badge">Message</div>
    <div class="r2-message" id="r2Msg">—</div>
  </div>
</div>

<script>
(function () {
  "use strict";

  // ─── CONFIG ───────────────────────────────────────────────
  const API_URL        = 'https://script.google.com/macros/s/AKfycbxxE4hoBybG-HJGR9AYKjE1cXYhU9SIThzdy23xxLyzSSI5FEbvlEDn33wpz-tcdLkB/exec';
  const POLL_MS        = 5000;
  const CELEBRATE_MS   = 25000;   // confetti duration
  const SALE_TOAST_MS  = 25000;   // how long sale toast stays
  const R2_TOAST_MS    = 15000;   // how long R2 toast stays
  const QUEUE_GAP_MS   = 22000;   // wait between queued celebrations

  // ─── STATE ───────────────────────────────────────────────
  let prev            = null;
  let audioCtx        = null;
  let audioAllowed    = false;
  let soundRef        = null;
  let queue           = [];
  let celebrating     = false;
  let saleToastTimer  = null;
  let r2ToastTimer    = null;

  // ─── DOM ─────────────────────────────────────────────────
  const $ = id => document.getElementById(id);
  const syncLabel    = $('syncLabel');
  const audioBtn     = $('audioBtn');
  const audioHint    = $('audioHint');
  const statLabel1   = $('statLabel1');
  const statValue1   = $('statValue1');
  const statValue2   = $('statValue2');
  const statCard2    = $('statCard2');
  const teamName     = $('teamName');
  const totalBadge   = $('totalBadge');
  const heroCounter  = $('heroCounter');
  const memberGrid   = $('memberGrid');
  const tickerWrap   = $('tickerContent');
  const mainCard     = $('mainCard');
  const saleToast    = $('saleToast');
  const toastName    = $('toastName');
  const toastSub     = $('toastSub');
  const toastDiff    = $('toastDiff');
  const r2Toast      = $('r2Toast');
  const r2Msg        = $('r2Msg');
  const statsBar     = $('statsBar');

  // ─── AUDIO ───────────────────────────────────────────────
  function initCtx() {
    if (audioCtx) return;
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
  }

  async function enableAudio() {
    initCtx();
    if (audioCtx && audioCtx.state === 'suspended') await audioCtx.resume();
    audioAllowed = true;
    audioBtn.classList.add('active');
    audioHint.textContent = '';
    const span = audioBtn.querySelector('span');
    if (span) span.textContent = 'Sound on';
    tick('Audio enabled');
  }

  function stopSounds() {
    if (!soundRef) return;
    ['o1','o2','o3','o4'].forEach(k => { try { soundRef[k] && soundRef[k].stop(); } catch(e){} });
    soundRef = null;
  }

  function playSale() {
    if (!audioAllowed || !audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    stopSounds();
    const now = audioCtx.currentTime;
    const mg = audioCtx.createGain(); mg.gain.value = 0.75; mg.connect(audioCtx.destination);
    const mk = (freq, type, start, vol, dur) => {
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(start === 0 ? vol : 0, now + start);
      if (start > 0) g.gain.linearRampToValueAtTime(vol, now + start + 0.01);
      g.gain.exponentialRampToValueAtTime(0.001, now + dur);
      o.connect(g).connect(mg);
      o.start(now + start); o.stop(now + dur);
      return o;
    };
    soundRef = {
      o1: mk(1396.9, 'triangle', 0,    0.9, 10),
      o2: mk(1760.0, 'sine',     0,    0.7, 10),
      o3: mk(1046.5, 'triangle', 0.55, 0.7, 10),
      o4: mk(1318.5, 'sine',     0.55, 0.6, 10),
    };
  }

  function playR2() {
    if (!audioAllowed || !audioCtx) return;
    if (audioCtx.state === 'suspended') audioCtx.resume();
    stopSounds();
    const now = audioCtx.currentTime;
    const mg = audioCtx.createGain(); mg.gain.value = 0.5; mg.connect(audioCtx.destination);
    const o1 = audioCtx.createOscillator(), g1 = audioCtx.createGain();
    o1.type = 'sine'; o1.frequency.value = 2093;
    g1.gain.setValueAtTime(0.6, now); g1.gain.exponentialRampToValueAtTime(0.001, now + 0.3);
    o1.connect(g1).connect(mg); o1.start(); o1.stop(now + 0.35);
    const o2 = audioCtx.createOscillator(), g2 = audioCtx.createGain();
    o2.type = 'sine'; o2.frequency.value = 2637;
    g2.gain.setValueAtTime(0, now + 0.4); g2.gain.linearRampToValueAtTime(0.6, now + 0.41);
    g2.gain.exponentialRampToValueAtTime(0.001, now + 0.75);
    o2.connect(g2).connect(mg); o2.start(now + 0.4); o2.stop(now + 0.8);
    soundRef = { o1, o2 };
  }

  // ─── TICKER ──────────────────────────────────────────────
  function tick(msg) {
    const el = document.createElement('div');
    el.className = 'ticker-item';
    el.textContent = msg;
    tickerWrap.innerHTML = '';
    tickerWrap.appendChild(el);
  }

  // ─── CONFETTI ────────────────────────────────────────────
  function burst() {
    const end = Date.now() + CELEBRATE_MS;
    const frame = () => {
      confetti({ particleCount: 3, angle: 60,  spread: 55, origin: { x: 0, y: 0.7 }, colors: ['#3d8bff','#f5c842','#00e5c0','#fff'] });
      confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.7 }, colors: ['#3d8bff','#f5c842','#00e5c0','#fff'] });
      if (Date.now() < end) requestAnimationFrame(frame);
    };
    confetti({ particleCount: 160, spread: 80, origin: { y: 0.6 } });
    setTimeout(() => confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }), 220);
    frame();
  }

  // ─── TOASTS ──────────────────────────────────────────────
  function showSaleToast(name, diff) {
    if (saleToastTimer) clearTimeout(saleToastTimer);
    toastName.textContent = name;
    toastSub.textContent  = 'GOT A DO!';
    toastDiff.textContent = `+${diff}`;
    saleToast.classList.add('show');
    saleToastTimer = setTimeout(() => saleToast.classList.remove('show'), SALE_TOAST_MS);
  }

  function showR2Toast(msg) {
    if (r2ToastTimer) clearTimeout(r2ToastTimer);
    r2Msg.textContent = msg;
    r2Toast.classList.add('show');
    r2ToastTimer = setTimeout(() => r2Toast.classList.remove('show'), R2_TOAST_MS);
  }

  // ─── QUEUE ───────────────────────────────────────────────
  function processQueue() {
    if (celebrating || queue.length === 0) return;
    const ev = queue.shift();
    celebrating = true;

    showSaleToast(ev.name, ev.diff);
    playSale();
    burst();
    tick(`${ev.name}  +${ev.diff} DO  ·  ${ev.team}`);
    mainCard.classList.add('celebrate');

    heroCounter.classList.add('pop');
    setTimeout(() => heroCounter.classList.remove('pop'), 600);

    // flash the specific member tag
    const tags = memberGrid.querySelectorAll('.member-tag');
    tags.forEach(t => {
      if (t.dataset.name === ev.name) t.classList.add('flash');
      setTimeout(() => t.classList.remove('flash'), 700);
    });

    setTimeout(() => {
      celebrating = false;
      mainCard.classList.remove('celebrate');
      processQueue();
    }, QUEUE_GAP_MS);
  }

  function enqueue(events) {
    events.forEach(e => queue.push(e));
    if (!celebrating) processQueue();
  }

  // ─── CHANGE DETECTION ────────────────────────────────────
  function diff(newData) {
    if (!prev) return;

    // Sales
    const sales = [];
    const prevMap = new Map((prev.bella?.members || []).map(m => [m.name, m.value]));
    (newData.bella?.members || []).forEach(m => {
      const old = prevMap.get(m.name) || 0;
      if (m.value > old) sales.push({ name: m.name, team: newData.bella.name, diff: m.value - old });
    });
    if (sales.length) enqueue(sales);

    // R2 message
    const oldR2 = prev.r2Message || '';
    const newR2 = newData.r2Message || '';
    if (newR2 && newR2 !== oldR2) {
      showR2Toast(newR2);
      playR2();
      tick(newR2);
    }
  }

  // ─── RENDER ──────────────────────────────────────────────
  function render(data) {
    // Stats bar: G1 (text), G2 (number)
    const g1 = data.g1Label || '';
    const g1val = data.g1Value || '';
    const g2val = data.g2Value;

    if (g1val || g1) {
      statLabel1.textContent = g1 || 'Stat';
      statValue1.textContent = g1val !== '' ? g1val : '—';
      statsBar.style.display = '';
    } else {
      statsBar.style.display = 'none';
    }

    if (g2val !== undefined && g2val !== '') {
      statValue2.textContent = g2val;
      statValue2.classList.add('is-number');
    } else {
      statValue2.textContent = '—';
    }

    // Main counter
    const bella = data.bella;
    if (!bella) return;

    teamName.textContent   = bella.name;
    heroCounter.textContent = bella.total;
    totalBadge.textContent  = bella.total;

    // Members
    memberGrid.innerHTML = bella.members.map(m =>
      `<div class="member-tag" data-name="${m.name}">
        <span class="name">${m.name}</span>
        <span class="val">${m.value}</span>
      </div>`
    ).join('');
  }

  // ─── FETCH ───────────────────────────────────────────────
  async function fetchData() {
    try {
      const res = await fetch(API_URL);
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const isFirst = !prev;
      diff(data);
      render(data);
      prev = data;
      syncLabel.textContent = isFirst ? '· live' : '· live';
    } catch(e) {
      console.warn(e);
      syncLabel.textContent = '· reconnecting';
    }
  }

  // ─── INIT ────────────────────────────────────────────────
  initCtx();
  audioHint.textContent = '';
  audioBtn.querySelector('span').textContent = 'Sound off';
  audioBtn.addEventListener('click', enableAudio);

  fetchData();
  setInterval(fetchData, POLL_MS);
})();
</script>
</body>
</html>
