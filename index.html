<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sales Race · Live</title>
  <!-- Favicon (SVG trophy) -->
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='%23FFD700'%3E%3Cpath d='M12 2L15 9H22L16 14L19 21L12 16.5L5 21L8 14L2 9H9L12 2Z'/%3E%3C/svg%3E">
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
  <!-- Confetti -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Inter", sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      transition: background 0.3s, color 0.2s;
      position: relative;
      overflow-x: hidden;
    }

    /* Light / Dark themes */
    body.light {
      background: #f5f9ff;
      color: #0a1a2b;
    }
    body.dark {
      background: #050a12;
      color: #ffffff;
    }

    /* Animated background orbs (only visible in dark mode) */
    .bg-orb {
      position: fixed;
      width: 60vmax;
      height: 60vmax;
      border-radius: 50%;
      filter: blur(80px);
      z-index: -1;
      animation: floatOrb 25s infinite alternate ease-in-out;
      opacity: 0;
      transition: opacity 0.3s;
    }
    body.dark .bg-orb { opacity: 1; }
    body.light .bg-orb { opacity: 0; }

    .orb1 { top: -20vh; left: -10vw; background: radial-gradient(circle, #1e4b8a30, #050a1200); }
    .orb2 { bottom: -10vh; right: -5vw; background: radial-gradient(circle, #9b4dff30, #050a1200); animation-duration: 30s; }

    @keyframes floatOrb {
      0% { transform: translate(0, 0) scale(1); }
      100% { transform: translate(8vw, 6vh) scale(1.2); }
    }

    .dashboard {
      max-width: 1400px;
      width: 100%;
      position: relative;
      z-index: 5;
    }

    /* Top bar */
    .top-bar {
      display: flex;
      justify-content: flex-end;
      align-items: center;
      margin-bottom: 24px;
      gap: 12px;
    }

    .status-chip {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(20, 30, 45, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 8px 18px;
      border-radius: 40px;
      border: 1px solid rgba(0, 200, 255, 0.15);
      font-size: 0.9rem;
      font-weight: 500;
      color: #b0d5ff;
    }
    body.light .status-chip {
      background: rgba(255, 255, 255, 0.7);
      border-color: #3a8cff30;
      color: #1a3a5e;
    }

    .live-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2effb0;
      box-shadow: 0 0 15px #00ffb3;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.4; transform: scale(1.2); }
    }

    .icon-btn {
      background: rgba(20, 30, 45, 0.5);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 40px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s;
      color: #c6dcff;
    }
    body.light .icon-btn {
      background: rgba(255,255,255,0.8);
      border-color: #c0d4f0;
      color: #1e3a5f;
    }
    .icon-btn:hover {
      background: #1e3a5f;
      border-color: #3a8cff;
      color: white;
    }
    body.light .icon-btn:hover {
      background: #d0e2ff;
      color: #0a1a2b;
    }
    .icon-btn svg {
      width: 22px;
      height: 22px;
      stroke: currentColor;
      stroke-width: 2;
      fill: none;
    }

    /* Theme toggle specific */
    #themeToggle svg {
      fill: none;
    }

    /* Team cards */
    .counters-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-bottom: 32px;
    }

    .team-card {
      background: rgba(12, 22, 36, 0.5);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 56px;
      padding: 40px 32px;
      box-shadow: 0 30px 50px -15px #00000080, inset 0 0 0 1px #ffffff08;
      transition: transform 0.3s ease, border-color 0.2s, background 0.3s;
    }
    body.light .team-card {
      background: rgba(255, 255, 255, 0.7);
      border-color: #c0d4f0;
      box-shadow: 0 20px 40px -10px #00000020, inset 0 0 0 1px #ffffff80;
    }
    .team-card:hover {
      border-color: #2f6eb080;
      transform: translateY(-6px);
    }

    .team-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .team-header svg {
      width: 34px;
      height: 34px;
      stroke: #80b4ff;
    }
    body.light .team-header svg { stroke: #1e4f9e; }

    .team-name {
      font-size: 2.5rem;
      font-weight: 600;
      letter-spacing: -0.02em;
      background: linear-gradient(135deg, #ffffff, #b8d4ff);
      -webkit-background-clip: text;
      background-clip: text;
      color: transparent;
    }
    body.light .team-name {
      background: linear-gradient(135deg, #0a1a2b, #1e4f9e);
      -webkit-background-clip: text;
      background-clip: text;
    }

    .counter-value {
      font-size: 8.5rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -0.03em;
      color: #ffffff;
      text-shadow: 0 0 40px #2a7fff, 0 0 80px #1e4f9e;
      margin-bottom: 24px;
      font-feature-settings: "tnum";
      transition: text-shadow 0.2s;
    }
    body.light .counter-value {
      color: #0a1a2b;
      text-shadow: 0 0 20px #3a8cff40, 0 0 40px #1e4f9e20;
    }
    .counter-value.pop {
      animation: numberPop 0.4s cubic-bezier(0.2,0.9,0.4,1.2);
    }
    @keyframes numberPop {
      0% { text-shadow: 0 0 40px #2a7fff, 0 0 80px #1e4f9e; transform: scale(1); }
      50% { text-shadow: 0 0 70px #ffd966, 0 0 120px #ffaa33; transform: scale(1.02); }
      100% { text-shadow: 0 0 40px #2a7fff, 0 0 80px #1e4f9e; transform: scale(1); }
    }

    .member-strip {
      display: flex;
      flex-wrap: wrap;
      gap: 10px 18px;
      border-top: 1px solid #ffffff10;
      padding-top: 28px;
    }
    body.light .member-strip { border-top-color: #b0c8e0; }

    .member-tag {
      background: #ffffff08;
      padding: 8px 20px;
      border-radius: 40px;
      border: 1px solid #ffffff0c;
      font-size: 1.1rem;
      font-weight: 450;
      color: #d3e4ff;
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      gap: 12px;
    }
    body.light .member-tag {
      background: #ffffffb0;
      border-color: #b8d0f0;
      color: #0a1a2b;
    }
    .member-tag strong {
      font-weight: 650;
      color: #f9e57c;
    }
    body.light .member-tag strong { color: #c47a1a; }

    /* Ticker */
    .ticker-wrap {
      background: #0b1622b0;
      backdrop-filter: blur(16px);
      border: 1px solid #ffffff0a;
      border-radius: 50px;
      padding: 12px 24px;
      margin-top: 20px;
      display: flex;
      align-items: center;
      gap: 16px;
    }
    body.light .ticker-wrap {
      background: #ffffffc0;
      border-color: #b8d0f0;
    }
    .ticker-icon svg {
      width: 24px;
      height: 24px;
      stroke: #6ea8fe;
    }
    body.light .ticker-icon svg { stroke: #1e4f9e; }
    .ticker-content {
      flex: 1;
      overflow: hidden;
      height: 36px;
      position: relative;
    }
    .ticker-item {
      position: absolute;
      width: 100%;
      font-size: 1.2rem;
      font-weight: 450;
      color: #dfebff;
      white-space: nowrap;
      animation: tickerSlide 0.4s ease;
    }
    body.light .ticker-item { color: #0a1a2b; }
    @keyframes tickerSlide {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* Center toast – stays 30s */
    .center-toast {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -70%);
      background: #132236e0;
      backdrop-filter: blur(30px);
      border: 1px solid #5fa3ff80;
      border-radius: 100px;
      padding: 22px 48px;
      box-shadow: 0 20px 40px #00000060, 0 0 60px #3a8cff40;
      z-index: 999;
      opacity: 0;
      transition: opacity 0.3s, transform 0.4s cubic-bezier(0.34,1.56,0.64,1);
      pointer-events: none;
      text-align: center;
    }
    body.light .center-toast {
      background: #ffffffec;
      border-color: #3a8cff;
      box-shadow: 0 20px 40px #00000020, 0 0 40px #3a8cff40;
    }
    .center-toast.show {
      opacity: 1;
      transform: translate(-50%, -50%);
    }
    .toast-text {
      font-size: 2.2rem;
      font-weight: 600;
      color: white;
      text-shadow: 0 0 20px #aad0ff;
    }
    body.light .toast-text {
      color: #0a1a2b;
      text-shadow: none;
    }
    .toast-sub {
      font-size: 1.2rem;
      color: #bdd6ff;
      margin-top: 6px;
    }
    body.light .toast-sub { color: #2a4a7a; }

    .audio-hint {
      margin-left: 12px;
      font-size: 0.85rem;
      color: #99b8e0;
    }
    body.light .audio-hint { color: #1e3a5f; }

    @media (max-width: 800px) {
      .counters-grid { grid-template-columns: 1fr; }
      .counter-value { font-size: 6rem; }
      .toast-text { font-size: 1.6rem; }
    }
  </style>
</head>
<body class="dark">
<div class="bg-orb orb1"></div>
<div class="bg-orb orb2"></div>

<div class="dashboard">
  <div class="top-bar">
    <div class="status-chip">
      <span class="live-dot"></span>
      <span id="syncLabel">LIVE</span>
    </div>
    <div class="icon-btn" id="audioBtn" title="Enable sound">
      <svg viewBox="0 0 24 24">
        <path d="M3 10V14H7L12 19V5L7 10H3Z" />
        <path d="M16 8.5C17.3333 10 17.3333 14 16 15.5" />
        <path d="M19 5C22 9 22 15 19 19" />
      </svg>
    </div>
    <div class="icon-btn" id="themeToggle" title="Toggle light/dark mode">
      <svg viewBox="0 0 24 24">
        <path d="M12 3V4M12 20V21M21 12H20M4 12H3M18.364 5.636L17.657 6.343M6.343 17.657L5.636 18.364M18.364 18.364L17.657 17.657M6.343 6.343L5.636 5.636" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
        <circle cx="12" cy="12" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>
    </div>
  </div>

  <div class="counters-grid">
    <!-- Bella Card -->
    <div class="team-card">
      <div class="team-header">
        <svg viewBox="0 0 24 24">
          <path d="M12 2L15 9H22L16 14L19 21L12 16.5L5 21L8 14L2 9H9L12 2Z" stroke="currentColor" stroke-linejoin="round"/>
        </svg>
        <div class="team-name" id="bellaName">Bella's Team</div>
      </div>
      <div class="counter-value" id="bellaCounter">0</div>
      <div class="member-strip" id="bellaMembers"></div>
    </div>
    <!-- Cassie Card -->
    <div class="team-card">
      <div class="team-header">
        <svg viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="1.8"/>
          <path d="M12 6V12L16 14" stroke="currentColor" stroke-linecap="round"/>
        </svg>
        <div class="team-name" id="cassieName">Cassie's Team</div>
      </div>
      <div class="counter-value" id="cassieCounter">0</div>
      <div class="member-strip" id="cassieMembers"></div>
    </div>
  </div>

  <!-- Ticker -->
  <div class="ticker-wrap">
    <div class="ticker-icon">
      <svg viewBox="0 0 24 24">
        <path d="M22 12H18L15 21L9 3L6 12H2" stroke="currentColor" stroke-width="2" fill="none"/>
      </svg>
    </div>
    <div class="ticker-content" id="tickerContent">
      <div class="ticker-item">— Monitoring sales —</div>
    </div>
    <span class="audio-hint" id="audioStateHint"></span>
  </div>
</div>

<!-- Center Toast -->
<div class="center-toast" id="centerToast">
  <div class="toast-text" id="toastMain">Sale!</div>
  <div class="toast-sub" id="toastSub"></div>
</div>

<script>
  (function(){
    "use strict";

    // ---------- CONFIG ----------
    const API_URL = 'https://script.google.com/macros/s/AKfycbzgXt4BCmxZjC3VzZ5x3FRVmMsH0KhuMhE4bVjtsqjf5M7Zsof8Qw4nIm0higVWNb5O/exec';
    const POLL_INTERVAL = 5000;
    const CELEBRATION_DURATION = 30000;       // 30 sec
    const TOAST_DURATION = 30000;             // 30 sec toast
    const SOUND_DURATION = 5000;              // 5 sec (sound envelope)
    const QUEUE_GAP = 30000;                  // 30 sec between queued celebrations

    // State
    let previousData = null;
    let audioCtx = null;
    let audioAllowed = false;
    let celebrationQueue = [];
    let isCelebrating = false;
    let celebrationTimer = null;
    let soundSource = null;
    let toastTimeout = null;

    // DOM
    const bellaName = document.getElementById('bellaName');
    const bellaCounter = document.getElementById('bellaCounter');
    const bellaMembers = document.getElementById('bellaMembers');
    const cassieName = document.getElementById('cassieName');
    const cassieCounter = document.getElementById('cassieCounter');
    const cassieMembers = document.getElementById('cassieMembers');
    const tickerContent = document.getElementById('tickerContent');
    const syncLabel = document.getElementById('syncLabel');
    const audioBtn = document.getElementById('audioBtn');
    const audioStateHint = document.getElementById('audioStateHint');
    const centerToast = document.getElementById('centerToast');
    const toastMain = document.getElementById('toastMain');
    const toastSub = document.getElementById('toastSub');
    const themeToggle = document.getElementById('themeToggle');
    const body = document.body;

    // ---------- THEME TOGGLE ----------
    themeToggle.addEventListener('click', () => {
      if (body.classList.contains('dark')) {
        body.classList.remove('dark');
        body.classList.add('light');
      } else {
        body.classList.remove('light');
        body.classList.add('dark');
      }
    });

    // ---------- AUDIO (Double Ting-Ting) ----------
    function initAudio() {
      if (audioCtx) return true;
      try {
        audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        return true;
      } catch (e) {
        return false;
      }
    }

    async function enableAudio() {
      if (!initAudio()) return;
      if (audioCtx.state === 'suspended') await audioCtx.resume();
      audioAllowed = true;
      audioStateHint.textContent = 'Sound on';
      audioBtn.style.color = '#6ef0b0';
      updateTicker('Audio enabled', false);
    }

    function playDoubleChime() {
      if (!audioAllowed || !audioCtx) return;
      if (audioCtx.state === 'suspended') audioCtx.resume();
      stopSound();

      const now = audioCtx.currentTime;
      const gain = audioCtx.createGain();
      gain.gain.setValueAtTime(0.35, now);
      gain.connect(audioCtx.destination);

      // First chime (high)
      const osc1 = audioCtx.createOscillator();
      osc1.type = 'sine';
      osc1.frequency.value = 1318.5; // E6
      const osc2 = audioCtx.createOscillator();
      osc2.type = 'triangle';
      osc2.frequency.value = 1568.0; // G6

      const merger = audioCtx.createChannelMerger(2);
      osc1.connect(merger, 0, 0);
      osc2.connect(merger, 0, 1);
      merger.connect(gain);

      // Envelope: quick attack, decay
      gain.gain.setValueAtTime(0.35, now);
      gain.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      
      osc1.start();
      osc2.start();
      osc1.stop(now + 0.2);
      osc2.stop(now + 0.2);

      // Second chime after 0.25s
      const osc3 = audioCtx.createOscillator();
      osc3.type = 'sine';
      osc3.frequency.value = 1174.7; // D6
      const osc4 = audioCtx.createOscillator();
      osc4.type = 'triangle';
      osc4.frequency.value = 1396.9; // F6

      const gain2 = audioCtx.createGain();
      gain2.gain.setValueAtTime(0, now + 0.25);
      gain2.gain.linearRampToValueAtTime(0.3, now + 0.26);
      gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.45);
      gain2.connect(audioCtx.destination);

      const merger2 = audioCtx.createChannelMerger(2);
      osc3.connect(merger2, 0, 0);
      osc4.connect(merger2, 0, 1);
      merger2.connect(gain2);

      osc3.start(now + 0.25);
      osc4.start(now + 0.25);
      osc3.stop(now + 0.5);
      osc4.stop(now + 0.5);

      soundSource = { osc1, osc2, osc3, osc4, gain, gain2 };
    }

    function stopSound() {
      if (soundSource) {
        try { soundSource.osc1.stop(); } catch(e) {}
        try { soundSource.osc2.stop(); } catch(e) {}
        try { soundSource.osc3.stop(); } catch(e) {}
        try { soundSource.osc4.stop(); } catch(e) {}
        soundSource = null;
      }
    }

    // ---------- CENTER TOAST (30 sec) ----------
    function showCenterToast(name, team) {
      if (toastTimeout) clearTimeout(toastTimeout);
      toastMain.textContent = `${name} · ${team}`;
      toastSub.textContent = 'Just got a sale!';
      centerToast.classList.add('show');
      toastTimeout = setTimeout(() => {
        centerToast.classList.remove('show');
      }, TOAST_DURATION);
    }

    // ---------- TICKER ----------
    function updateTicker(message, isSale = true) {
      const item = document.createElement('div');
      item.className = 'ticker-item';
      item.textContent = message;
      tickerContent.innerHTML = '';
      tickerContent.appendChild(item);
    }

    // ---------- CELEBRATION (confetti) ----------
    function startConfetti() {
      const end = Date.now() + CELEBRATION_DURATION;
      const frame = () => {
        confetti({ particleCount: 3, angle: 60, spread: 55, origin: { x: 0, y: 0.7 }, colors: ['#4da6ff', '#ffd966', '#fff'] });
        confetti({ particleCount: 3, angle: 120, spread: 55, origin: { x: 1, y: 0.7 }, colors: ['#4da6ff', '#ffd966', '#fff'] });
        if (Date.now() < end) requestAnimationFrame(frame);
      };
      frame();
      confetti({ particleCount: 150, spread: 80, origin: { y: 0.6 } });
      setTimeout(() => confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } }), 200);
    }

    // ---------- QUEUE PROCESSOR ----------
    function processQueue() {
      if (isCelebrating || celebrationQueue.length === 0) return;
      
      const event = celebrationQueue.shift();
      isCelebrating = true;

      showCenterToast(event.name, event.team);
      updateTicker(`${event.name} · ${event.team}  +${event.diff} sale`);
      playDoubleChime();
      startConfetti();
      
      bellaCounter.classList.add('pop');
      cassieCounter.classList.add('pop');
      setTimeout(() => {
        bellaCounter.classList.remove('pop');
        cassieCounter.classList.remove('pop');
      }, 500);

      celebrationTimer = setTimeout(() => {
        isCelebrating = false;
        processQueue();
      }, QUEUE_GAP);
    }

    function enqueueSaleEvents(events) {
      events.forEach(ev => celebrationQueue.push(ev));
      if (!isCelebrating) processQueue();
    }

    // ---------- DETECT CHANGES ----------
    function detectSales(newData) {
      if (!previousData) return;
      const sales = [];

      const prevBella = new Map(previousData.bella.members.map(m => [m.name, m.value]));
      newData.bella.members.forEach(m => {
        const prev = prevBella.get(m.name) || 0;
        if (m.value > prev) {
          sales.push({ team: newData.bella.name, name: m.name, diff: m.value - prev });
        }
      });

      const prevCassie = new Map(previousData.cassie.members.map(m => [m.name, m.value]));
      newData.cassie.members.forEach(m => {
        const prev = prevCassie.get(m.name) || 0;
        if (m.value > prev) {
          sales.push({ team: newData.cassie.name, name: m.name, diff: m.value - prev });
        }
      });

      if (sales.length) {
        enqueueSaleEvents(sales);
      }
    }

    // ---------- RENDER UI ----------
    function render(data) {
      bellaName.textContent = data.bella.name;
      cassieName.textContent = data.cassie.name;
      bellaCounter.textContent = data.bella.total;
      cassieCounter.textContent = data.cassie.total;

      bellaMembers.innerHTML = data.bella.members.map(m => 
        `<div class="member-tag">${m.name} <strong>${m.value}</strong></div>`).join('');
      cassieMembers.innerHTML = data.cassie.members.map(m => 
        `<div class="member-tag">${m.name} <strong>${m.value}</strong></div>`).join('');
    }

    async function fetchData() {
      try {
        const res = await fetch(API_URL);
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        
        if (!previousData) {
          render(data);
          updateTicker('Dashboard connected', false);
        } else {
          detectSales(data);
          render(data);
        }
        previousData = data;
        syncLabel.textContent = 'LIVE';
      } catch (e) {
        console.warn(e);
        syncLabel.textContent = 'RECONNECT';
      }
    }

    // ---------- INIT ----------
    function init() {
      fetchData();
      setInterval(fetchData, POLL_INTERVAL);
      
      audioBtn.addEventListener('click', enableAudio);
      initAudio();
      audioStateHint.textContent = 'Click speaker';
    }

    init();
  })();
</script>
</body>
</html>
